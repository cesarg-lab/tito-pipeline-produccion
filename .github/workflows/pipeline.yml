#
# Triggers:
#   - cron diario 02:47 UTC = 22:47 Chile (invierno) / 23:47 Chile (verano)
#   - manual desde la UI de GitHub Actions (bot횄쨀n "Run workflow")
#
# Secrets requeridos (Settings 창혛혪 Secrets and variables 창혛혪 Actions):
#   ARAUCO_USER, ARAUCO_PASS
#   FTP_HOST, FTP_USER, FTP_PASS
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# 창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨창혮혨

on:
  schedule:
    - cron: '47 2 * * *'    # 02:47 UTC = 22:47 Chile invierno / 23:47 Chile verano
  workflow_dispatch:        # bot횄쨀n manual "Run workflow" en la UI de GitHub

jobs:
  run-pipeline:
    name: Descarga + HTML + FTP + Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout c횄쨀digo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Hacer ejecutable el orquestador
        run: chmod +x run_pipeline.sh

      - name: Correr pipeline
        env:
          ARAUCO_USER:        ${{ secrets.ARAUCO_USER }}
          ARAUCO_PASS:        ${{ secrets.ARAUCO_PASS }}
          FTP_HOST:           ${{ secrets.FTP_HOST }}
          FTP_USER:           ${{ secrets.FTP_USER }}
          FTP_PASS:           ${{ secrets.FTP_PASS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash run_pipeline.sh

      - name: Subir logs como artefacto (solo si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: |
            descarga_log.txt
            pipeline_*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Notificar fallo a Telegram (solo si falla)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MENSAJE="창혶혣 <b>Pipeline Producci횄쨀n FALL횄혫</b>
          챨혺혮혨 $(date '+%Y-%m-%d %H:%M:%S UTC')

          Revisa el log en GitHub Actions:
          ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MENSAJE}" > /dev/null || true
