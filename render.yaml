# ══════════════════════════════════════════════════════════════════════════════
# render.yaml — Render Cron Job para pipeline producción Millalemu
# ══════════════════════════════════════════════════════════════════════════════
# Documentación: https://render.com/docs/blueprint-spec
#
# Free tier: Cron Jobs gratis hasta 750 horas/mes (más que suficiente para 1 corrida/día)
#
# Schedule:
#   Cesar quiere las 23:00 hora Chile (UTC-3 horario verano = 02:00 UTC, UTC-4 invierno = 03:00 UTC)
#   Usamos 02:00 UTC fijo (cubre verano; en invierno corre a las 22:00 Chile, igual cae bien)
#
# Las ENV vars se configuran en Render Dashboard → Environment, no acá
# (NO commitear secrets al repo).
# ══════════════════════════════════════════════════════════════════════════════

services:
  - type: cron
    name: tito-pipeline-produccion
    runtime: python
    plan: free
    schedule: "0 2 * * *"   # 02:00 UTC todos los días = 23:00 Chile horario verano
    buildCommand: pip install -r requirements.txt
    startCommand: bash run_pipeline.sh
    envVars:
      - key: ARAUCO_USER
        sync: false
      - key: ARAUCO_PASS
        sync: false
      - key: FTP_HOST
        sync: false
      - key: FTP_USER
        sync: false
      - key: FTP_PASS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
